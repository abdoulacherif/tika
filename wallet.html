<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TIKA — Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--green:#00A651;--green-dark:#007A3D;--green-light:#E8F7EF;--red:#E63946;--red-light:#FDECEA;--gray:#F4F6F8;--gray2:#E8ECF0;--text:#1A1A2E;--text2:#6B7280;--shadow:0 4px 24px rgba(0,166,81,0.15);}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--gray);color:var(--text);overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:90px}
.header{background:linear-gradient(135deg,#00A651,#007A3D);padding:50px 24px 24px;position:relative;overflow:hidden;}
.header-top{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.back-btn{width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;}
.header-title{font-size:20px;font-weight:700;color:#fff;}
.header-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-top:2px;}
.balance-card{margin:20px;background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.balance-label{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.8px;}
.balance-amount{font-size:30px;font-weight:700;color:var(--text);margin:6px 0;font-family:'Playfair Display',serif;}
.balance-row{display:flex;gap:10px;margin-top:14px;}
.balance-mini{flex:1;background:var(--gray);border-radius:12px;padding:10px;}
.balance-mini-label{font-size:10px;color:var(--text2);font-weight:500;}
.balance-mini-val{font-size:14px;font-weight:700;margin-top:3px;}
.balance-mini-val.green{color:var(--green)}
.balance-mini-val.red{color:var(--red)}
.tabs{display:flex;margin:0 20px 16px;background:#fff;border-radius:14px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.tab{flex:1;padding:10px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);border-radius:10px;cursor:pointer;transition:.2s;}
.tab.active{background:var(--green);color:#fff;font-weight:600;}
.section{padding:0 20px;margin-bottom:20px;}
.tx-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-icon.recharge{background:var(--green-light);}
.tx-icon.withdraw{background:var(--red-light);}
.tx-icon.gain{background:#EEF2FF;}
.tx-icon.commission{background:#FFFBEB;}
.tx-info{flex:1;}
.tx-title{font-size:14px;font-weight:600;color:var(--text);}
.tx-date{font-size:11px;color:var(--text2);margin-top:2px;}
.tx-amount{text-align:right;}
.tx-val{font-size:15px;font-weight:700;}
.tx-val.green{color:var(--green)}
.tx-val.red{color:var(--red)}
.tx-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-top:4px;display:inline-block;}
.tx-status.pending{background:#FFF8E1;color:#F59E0B;}
.tx-status.approved{background:var(--green-light);color:var(--green-dark);}
.tx-status.rejected{background:var(--red-light);color:var(--red);}
.tx-status.processing{background:#EEF2FF;color:#6366F1;}
.empty-state{text-align:center;padding:40px 20px;background:#fff;border-radius:16px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text2);}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--gray2);display:flex;padding:8px 0 20px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 0;}
.nav-icon{font-size:22px;transition:.2s;}
.nav-label{font-size:10px;font-weight:500;color:var(--text2);}
.nav-item.active .nav-label{color:var(--green);}
.nav-item.active .nav-icon{transform:scale(1.1);}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">&#8592;</div>
      <div>
        <div class="header-title">Mon Wallet</div>
        <div class="header-sub">Historique des transactions</div>
      </div>
    </div>
  </div>
  <div class="balance-card">
    <div class="balance-label">Solde disponible</div>
    <div class="balance-amount">FCFA <span id="balance">0</span></div>
    <div class="balance-row">
      <div class="balance-mini">
        <div class="balance-mini-label">Total gains</div>
        <div class="balance-mini-val green" id="total-gains">0 F</div>
      </div>
      <div class="balance-mini">
        <div class="balance-mini-label">Total investi</div>
        <div class="balance-mini-val" id="total-invested">0 F</div>
      </div>
      <div class="balance-mini">
        <div class="balance-mini-label">Total retire</div>
        <div class="balance-mini-val red" id="total-withdrawn">0 F</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('recharges',this)">Recharges</button>
    <button class="tab" onclick="switchTab('withdrawals',this)">Retraits</button>
    <button class="tab" onclick="switchTab('gains',this)">Gains</button>
    <button class="tab" onclick="switchTab('commissions',this)">Commissions</button>
  </div>
  <div class="section" id="list-container">
    <div class="empty-state">
      <div class="empty-icon">&#128176;</div>
      <div class="empty-title">Chargement...</div>
    </div>
  </div>
</div>
<div class="navbar">
  <div class="nav-item" onclick="window.location.href='dashboard.html'">
    <div class="nav-icon">&#127968;</div>
    <div class="nav-label">Accueil</div>
  </div>
  <div class="nav-item" onclick="window.location.href='invest.html'">
    <div class="nav-icon">&#128200;</div>
    <div class="nav-label">Investir</div>
  </div>
  <div class="nav-item active">
    <div class="nav-icon">&#128176;</div>
    <div class="nav-label">Wallet</div>
  </div>
  <div class="nav-item" onclick="window.location.href='referral.html'">
    <div class="nav-icon">&#129309;</div>
    <div class="nav-label">Parrainage</div>
  </div>
  <div class="nav-item" onclick="window.location.href='profile.html'">
    <div class="nav-icon">&#128100;</div>
    <div class="nav-label">Profil</div>
  </div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const sb = createClient('https://ainispvuqmuigfxzkkqh.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbmlzcHZ1cW11aWdmeHpra3FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODcyMDUsImV4cCI6MjA5NjA2MzIwNX0.UOZxfyhC2_B7TtuSK4ea_x6u4GOdIsVEIMX8NUlmndc');
const fmt = n => Number(n||0).toLocaleString('fr-FR');
const fmtDate = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
const statusLabel = {'pending':'En attente','approved':'Approuve','rejected':'Rejete','processing':'En cours','active':'Actif'};
const { data:{session} } = await sb.auth.getSession();
if(!session){window.location.href='index.html';}
const uid = session.user.id;
const {data:prof} = await sb.from('profiles').select('*').eq('id',uid).single();
if(prof){
  document.getElementById('balance').textContent = fmt(prof.balance);
  document.getElementById('total-gains').textContent = fmt(prof.total_gains)+' F';
  document.getElementById('total-invested').textContent = fmt(prof.total_invested)+' F';
  document.getElementById('total-withdrawn').textContent = fmt(prof.total_withdrawn)+' F';
}
let currentTab = 'recharges';
async function loadTab(tab) {
  currentTab = tab;
  const container = document.getElementById('list-container');
  container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9203;</div><div class="empty-title">Chargement...</div></div>';
  let html = '';
  if(tab === 'recharges') {
    const {data} = await sb.from('recharges').select('*').eq('user_id',uid).order('created_at',{ascending:false});
    if(!data||data.length===0){html='<div class="empty-state"><div class="empty-icon">&#128179;</div><div class="empty-title">Aucune recharge</div><div class="empty-sub">Vos recharges apparaitront ici</div></div>';}
    else html = data.map(r=>'<div class="tx-card"><div class="tx-icon recharge">&#128179;</div><div class="tx-info"><div class="tx-title">Recharge '+r.payment_method.replace('_',' ')+'</div><div class="tx-date">'+fmtDate(r.created_at)+'</div></div><div class="tx-amount"><div class="tx-val green">+'+fmt(r.amount)+' F</div><div class="tx-status '+r.status+'">'+( statusLabel[r.status]||r.status)+'</div></div></div>').join('');
  } else if(tab === 'withdrawals') {
    const {data} = await sb.from('withdrawals').select('*').eq('user_id',uid).order('created_at',{ascending:false});
    if(!data||data.length===0){html='<div class="empty-state"><div class="empty-icon">&#128184;</div><div class="empty-title">Aucun retrait</div><div class="empty-sub">Vos retraits apparaitront ici</div></div>';}
    else html = data.map(r=>'<div class="tx-card"><div class="tx-icon withdraw">&#128184;</div><div class="tx-info"><div class="tx-title">Retrait '+r.payment_method.replace('_',' ')+'</div><div class="tx-date">'+fmtDate(r.created_at)+'</div></div><div class="tx-amount"><div class="tx-val red">-'+fmt(r.amount)+' F</div><div class="tx-status '+(r.status==='processing'?'processing':r.status)+'">'+( statusLabel[r.status]||r.status)+'</div></div></div>').join('');
  } else if(tab === 'gains') {
    const {data} = await sb.from('daily_gains').select('*').eq('user_id',uid).order('created_at',{ascending:false});
    if(!data||data.length===0){html='<div class="empty-state"><div class="empty-icon">&#128200;</div><div class="empty-title">Aucun gain</div><div class="empty-sub">Vos gains quotidiens apparaitront ici</div></div>';}
    else html = data.map(g=>'<div class="tx-card"><div class="tx-icon gain">&#128200;</div><div class="tx-info"><div class="tx-title">Gain quotidien</div><div class="tx-date">'+fmtDate(g.created_at)+'</div></div><div class="tx-amount"><div class="tx-val green">+'+fmt(g.amount)+' F</div></div></div>').join('');
  } else if(tab === 'commissions') {
    const {data} = await sb.from('referral_commissions').select('*').eq('beneficiary_id',uid).order('created_at',{ascending:false});
    if(!data||data.length===0){html='<div class="empty-state"><div class="empty-icon">&#129309;</div><div class="empty-title">Aucune commission</div><div class="empty-sub">Vos commissions de parrainage apparaitront ici</div></div>';}
    else html = data.map(c=>'<div class="tx-card"><div class="tx-icon commission">&#129309;</div><div class="tx-info"><div class="tx-title">Commission N'+c.level+'</div><div class="tx-date">'+fmtDate(c.created_at)+'</div></div><div class="tx-amount"><div class="tx-val green">+'+fmt(c.amount)+' F</div><div class="tx-status approved">'+c.percent+'%</div></div></div>').join('');
  }
  container.innerHTML = html;
}
window.switchTab = (tab, el) => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadTab(tab);
};
loadTab('recharges');
</script>
</body>
</html>
