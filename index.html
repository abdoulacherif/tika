<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TIKA — Investis. Gagne. Grandis.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#00A651;
  --green-dark:#007A3D;
  --green-light:#E8F7EF;
  --red:#E63946;
  --red-light:#FDECEA;
  --white:#FFFFFF;
  --gray:#F4F6F8;
  --gray2:#E8ECF0;
  --text:#1A1A2E;
  --text2:#6B7280;
  --shadow:0 4px 24px rgba(0,166,81,0.15);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#fff;color:var(--text);overflow-x:hidden}
#splash{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#00A651 0%,#007A3D 60%,#005C2E 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease, transform .6s ease;}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-logo{width:90px;height:90px;background:rgba(255,255,255,0.15);border:3px solid rgba(255,255,255,0.4);border-radius:24px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:38px;font-weight:900;color:#fff;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.splash-name{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#fff;letter-spacing:4px}
.splash-slogan{font-size:13px;color:rgba(255,255,255,0.75);letter-spacing:2px;margin-top:8px;text-transform:uppercase}
.splash-loader{margin-top:60px;width:48px;height:4px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden}
.splash-loader-bar{height:100%;width:0;background:#fff;border-radius:4px;animation:load 2s ease forwards}
@keyframes load{0%{width:0}100%{width:100%}}
#app{min-height:100vh;display:none;flex-direction:column;max-width:430px;margin:0 auto}
#app.show{display:flex}
.app-header{background:linear-gradient(135deg,#00A651,#007A3D);padding:50px 24px 30px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.08);}
.app-header::after{content:'';position:absolute;bottom:-60px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);}
.header-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;}
.logo-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:2px}
.header-title{font-size:22px;font-weight:700;color:#fff;line-height:1.3;position:relative;z-index:1}
.header-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;position:relative;z-index:1}
.auth-tabs{display:flex;margin:0 24px;margin-top:-1px;background:var(--gray);border-radius:14px;padding:4px;}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text2);border-radius:10px;cursor:pointer;transition:.2s;}
.tab-btn.active{background:#fff;color:var(--green);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.forms-wrap{padding:24px;flex:1}
.form-panel{display:none}
.form-panel.active{display:block}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:14px 16px;border:2px solid var(--gray2);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;transition:.2s;}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(0,166,81,0.08)}
.form-input::placeholder{color:#CBD2D9}
.input-group{position:relative}
.input-group .form-input{padding-right:48px}
.input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text2);font-size:18px;user-select:none;}
.ref-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-light);color:var(--green-dark);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:16px;}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray2)}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:.3s;z-index:9999;max-width:340px;text-align:center;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--green)}
#toast.error{background:var(--red)}
.forgot-link{text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot-link a{font-size:12px;color:var(--green);font-weight:500;text-decoration:none}
.footer-note{text-align:center;font-size:12px;color:var(--text2);padding:16px 24px 32px}
.footer-note a{color:var(--green);font-weight:500;text-decoration:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-logo">T</div>
  <div class="splash-name">TIKA</div>
  <div class="splash-slogan">Investis · Gagne · Grandis</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>
<div id="app">
  <div class="app-header">
    <div class="header-logo">
      <div class="logo-box">T</div>
      <div class="logo-name">TIKA</div>
    </div>
    <div class="header-title">Bienvenue sur TIKA 👋</div>
    <div class="header-sub">La plateforme d'investissement qui vous fait grandir</div>
  </div>
  <div class="auth-tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
    <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
  </div>
  <div class="forms-wrap">
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <input class="form-input" type="password" id="login-password" placeholder="••••••••"/>
          <span class="input-icon" onclick="togglePwd('login-password',this)">👁</span>
        </div>
      </div>
      <div class="forgot-link"><a href="#" onclick="showForgot()">Mot de passe oublié ?</a></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Se connecter</button>
      <div class="divider">ou</div>
      <div style="text-align:center;font-size:13px;color:var(--text2)">
        Pas encore de compte ?
        <a href="#" onclick="switchTab('register')" style="color:var(--green);font-weight:600">Créer un compte</a>
      </div>
    </div>
    <div class="form-panel" id="panel-register">
      <div id="ref-info" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Ex: Moussa Diallo"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input class="form-input" type="tel" id="reg-phone" placeholder="+237 6XX XXX XXX"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <input class="form-input" type="password" id="reg-password" placeholder="Min 6 caractères"/>
          <span class="input-icon" onclick="togglePwd('reg-password',this)">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Code de parrainage (optionnel)</label>
        <input class="form-input" type="text" id="reg-ref" placeholder="Ex: AB12CD34" style="text-transform:uppercase"/>
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Créer mon compte</button>
      <div class="divider">ou</div>
      <div style="text-align:center;font-size:13px;color:var(--text2)">
        Déjà un compte ?
        <a href="#" onclick="switchTab('login')" style="color:var(--green);font-weight:600">Se connecter</a>
      </div>
    </div>
  </div>
  <div class="footer-note">En continuant, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">Politique de confidentialité</a></div>
</div>
<div id="toast"></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SUPABASE_URL = 'https://ainispvuqmuigfxzkkqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbmlzcHZ1cW11aWdmeHpra3FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0ODcyMDUsImV4cCI6MjA5NjA2MzIwNX0.UOZxfyhC2_B7TtuSK4ea_x6u4GOdIsVEIMX8NUlmndc';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
window.sb = sb;
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('show');
  }, 600);
}, 2200);
const { data: { session } } = await sb.auth.getSession();
if (session) {
  const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', session.user.id).single();
  if (profile?.is_admin) { window.location.href = 'admin.html'; }
  else { window.location.href = 'dashboard.html'; }
}
const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get('ref');
if (refCode) {
  document.getElementById('reg-ref').value = refCode.toUpperCase();
  document.getElementById('ref-info').style.display = 'block';
  document.getElementById('ref-info').innerHTML = '<div class="ref-badge">Parrainage : <strong>' + refCode.toUpperCase() + '</strong></div>';
  switchTab('register');
}
window.switchTab = (tab) => {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
};
window.togglePwd = (id, el) => {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; el.textContent = '🙈'; }
  else { inp.type = 'password'; el.textContent = '👁'; }
};
window.toast = (msg, type='') => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
};
const setLoading = (btnId, loading, label) => {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<div class="spinner"></div>' : label;
};
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { toast('Remplissez tous les champs', 'error'); return; }
  setLoading('btn-login', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { toast('Email ou mot de passe incorrect', 'error'); setLoading('btn-login', false, 'Se connecter'); return; }
  const { data: profile } = await sb.from('profiles').select('is_admin,is_banned').eq('id', data.user.id).single();
  if (profile?.is_banned) { await sb.auth.signOut(); toast('Compte suspendu.', 'error'); setLoading('btn-login', false, 'Se connecter'); return; }
  toast('Connexion réussie !', 'success');
  setTimeout(() => { window.location.href = profile?.is_admin ? 'admin.html' : 'dashboard.html'; }, 800);
};
window.doRegister = async () => {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const refInput = document.getElementById('reg-ref').value.trim().toUpperCase();
  if (!name || !email || !phone || !password) { toast('Remplissez tous les champs', 'error'); return; }
  if (password.length < 6) { toast('Mot de passe trop court (min 6)', 'error'); return; }
  setLoading('btn-register', true);
  let referredBy = null;
  if (refInput) {
    const { data: refProfile } = await sb.from('profiles').select('id').eq('referral_code', refInput).single();
    if (!refProfile) { toast('Code de parrainage invalide', 'error'); setLoading('btn-register', false, 'Créer mon compte'); return; }
    referredBy = refProfile.id;
  }
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) { toast(error.message.includes('already') ? 'Email déjà utilisé' : 'Erreur inscription', 'error'); setLoading('btn-register', false, 'Créer mon compte'); return; }
  await sb.from('profiles').update({ full_name: name, phone: phone, referred_by: referredBy }).eq('id', data.user.id);
  toast('Compte créé avec succès !', 'success');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
};
window.showForgot = async () => {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { toast("Entrez votre email d'abord", 'error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) { toast("Erreur. Vérifiez l'email.", 'error'); return; }
  toast('Email de réinitialisation envoyé !', 'success');
};
</script>
</body>
</html>
